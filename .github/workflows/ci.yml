name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false # no dependencies, so no go.sum to cache
      - run: go vet ./...
      - run: go test ./...
      - name: Build everything (library + examples)
        run: go build ./...
